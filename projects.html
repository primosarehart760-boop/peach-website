<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目历史 · Peach Studio</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: rgba(255,255,255,0.08); --text: #e6edf3; --muted: #8b949e;
      --peach: #d16a4e; --peach-light: rgba(209,106,78,0.15);
      --green: #3fb950; --yellow: #ffa657; --red: #f85149; --blue: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; min-height: 100vh; }

    /* Nav */
    .nav { background: rgba(13,17,23,0.95); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
    .nav-logo { color: var(--peach); font-weight: 700; font-size: 15px; text-decoration: none; }
    .nav-links { display: flex; gap: 6px; align-items: center; }
    .nav-link { color: var(--muted); text-decoration: none; font-size: 13px; padding: 5px 10px; border-radius: 6px; transition: all 0.15s; }
    .nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }

    /* Layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .page-header { padding: 40px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .page-header h1 { font-size: 24px; font-weight: 700; }
    .page-header p { color: var(--muted); font-size: 14px; margin-top: 6px; }

    /* Status badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-running  { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
    .badge-completed { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
    .badge-blocked  { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
    .badge-terminated { background: rgba(139,148,158,0.12); color: var(--muted); border: 1px solid rgba(139,148,158,0.3); }
    .badge-iterating { background: rgba(255,166,87,0.12); color: var(--yellow); border: 1px solid rgba(255,166,87,0.3); }

    /* Project card */
    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; transition: border-color 0.15s; }
    .project-card:hover { border-color: rgba(255,255,255,0.15); }
    .card-header { padding: 20px 24px; display: flex; align-items: flex-start; gap: 16px; cursor: pointer; }
    .card-icon { width: 42px; height: 42px; background: var(--peach-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .card-meta { flex: 1; min-width: 0; }
    .card-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { color: var(--muted); font-size: 12px; margin-top: 4px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .card-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn { border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--peach); color: white; }
    .btn-primary:hover { background: #b85a3f; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: #2d333b; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* Phase progress */
    .phase-row { display: flex; gap: 4px; margin-top: 10px; }
    .phase-pill { padding: 2px 8px; border-radius: 4px; font-size: 11px; background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }
    .phase-pill.done { background: rgba(63,185,80,0.1); color: var(--green); border-color: rgba(63,185,80,0.25); }

    /* Card body (docs + iterate) */
    .card-body { display: none; border-top: 1px solid var(--border); }
    .card-body.open { display: block; }

    /* Docs list */
    .docs-section { padding: 16px 24px; }
    .docs-section h4 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .doc-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
    .doc-item:hover { border-color: rgba(209,106,78,0.4); background: rgba(209,106,78,0.05); }
    .doc-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* Iteration list */
    .iter-history { padding: 0 24px 16px; }
    .iter-item { background: rgba(255,166,87,0.05); border: 1px solid rgba(255,166,87,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; }
    .iter-item-title { font-weight: 600; color: var(--yellow); margin-bottom: 4px; }
    .iter-item-summary { color: var(--muted); font-size: 12px; line-height: 1.5; }

    /* Iterate panel */
    .iterate-panel { padding: 20px 24px; border-top: 1px solid var(--border); background: rgba(209,106,78,0.03); }
    .iterate-panel h3 { font-size: 15px; font-weight: 700; color: var(--peach); margin-bottom:4px; }
    .iterate-panel p { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .iterate-panel textarea { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 10px 12px; resize: vertical; font-family: inherit; outline: none; }
    .iterate-panel textarea:focus { border-color: var(--peach); }

    .agent-selector { margin-top: 14px; }
    .agent-selector h4 { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .agent-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .agent-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); font-size: 12px; cursor: pointer; user-select: none; transition: all 0.15s; }
    .agent-chip input { width: 13px; height: 13px; accent-color: var(--peach); cursor: pointer; }
    .agent-chip.suggested { border-color: rgba(209,106,78,0.5); background: rgba(209,106,78,0.08); color: var(--peach); }
    .agent-chip.selected { border-color: var(--peach); background: rgba(209,106,78,0.15); }

    .cascade-hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

    .iterate-submit { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
    .iterate-result { font-size: 13px; padding: 10px 14px; border-radius: 8px; display: none; }
    .iterate-result.ok { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: var(--green); }
    .iterate-result.err { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); color: var(--red); }

    /* Doc viewer modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: min(780px, 95vw); max-height: 85vh; display: flex; flex-direction: column; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .modal-close:hover { color: var(--text); background: var(--surface2); }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-body pre { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; font-family: 'SF Mono', monospace; }

    /* Empty state */
    .empty-state { text-align: center; padding: 80px 0; color: var(--muted); }
    .empty-state .big { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

    /* Loading */
    .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">🍑 Peach Studio</a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">🎯 需求入口</a>
    <a href="results.html" class="nav-link">📦 结果工作台</a>
    <a href="projects.html" class="nav-link active">📁 项目历史</a>
    <a href="manual.html" class="nav-link">📘 使用手册</a>
    <a href="docs.html" class="nav-link">📖 知识库</a>
    <a href="team.html" class="nav-link">👥 团队</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>📁 项目历史</h1>
    <p>所有跑过的项目 · 点开可查文档 · 方向有变随时发起迭代更新</p>
  </div>

  <div id="project-list">
    <div class="loading">加载中...</div>
  </div>
</div>

<!-- 文档预览 Modal -->
<div class="modal-overlay" id="docModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="docModalTitle">文档预览</span>
      <button class="modal-close" onclick="closeDocModal()">✕</button>
    </div>
    <div class="modal-body">
      <pre id="docModalContent">加载中...</pre>
    </div>
  </div>
</div>

<script>
const BRIDGE = '';

// ── Agent 信息表 ──
const AGENT_INFO = {
  market:              { label: '市场研究',     phase: 'P1' },
  user:                { label: '用户研究',     phase: 'P1' },
  competitor_barrier:  { label: '竞品壁垒',     phase: 'P1' },
  n34:                 { label: 'AI 边界',       phase: 'P1' },
  swot_bp:             { label: 'SWOT/BP',      phase: 'P1' },
  brd_mrd:             { label: 'BRD/MRD',      phase: 'P1' },
  charter:             { label: 'Charter',      phase: 'P2' },
  user_survey:         { label: '用户旅程',     phase: 'P2' },
  prd:                 { label: 'PRD',          phase: 'P3' },
  flow:                { label: '流程图',       phase: 'P3' },
  roadmap:             { label: 'Roadmap',      phase: 'P3' },
  ui:                  { label: 'UI 规格',      phase: 'P3' },
  ia_feature:          { label: '功能架构',     phase: 'P3' },
  competitor:          { label: '竞品分析',     phase: 'P4' },
  tech:                { label: '技术方案',     phase: 'P4' },
  design_qa:           { label: 'Design QA',   phase: 'P4' },
  compliance:          { label: '合规',         phase: 'P5' },
  api_db:              { label: 'API/数据库',   phase: 'P5' },
  embed_test:          { label: '嵌入测试',     phase: 'P5' },
  ai_eval:             { label: 'AI 评测',      phase: 'P5' },
  sop_tech:            { label: 'SOP/安全',     phase: 'P5' },
  launch_ops:          { label: '上线运营',     phase: 'P6' },
  aso_retro:           { label: 'ASO/回顾',     phase: 'P6' },
  archive:             { label: '归档日志',     phase: 'P6' },
};

// ── 级联依赖（改了X → 建议重跑Y）──
const CASCADE = {
  market:             ['swot_bp', 'brd_mrd', 'charter', 'prd', 'roadmap'],
  user:               ['charter', 'prd', 'user_survey', 'ia_feature'],
  competitor_barrier: ['swot_bp', 'charter', 'prd'],
  n34:                ['prd', 'tech', 'embed_test', 'ai_eval'],
  charter:            ['prd', 'roadmap', 'ia_feature', 'design_qa'],
  prd:                ['flow', 'api_db', 'embed_test', 'ai_eval'],
  tech:               ['api_db', 'embed_test', 'ai_eval', 'sop_tech'],
  swot_bp:            ['charter', 'prd'],
  brd_mrd:            ['charter', 'prd', 'roadmap'],
};

// ── 关键词 → 建议 Agent ──
const KEYWORD_MAP = [
  { words: ['用户','客户','目标人群','受众','画像'],       agents: ['user','charter'] },
  { words: ['市场','行业','规模','TAM','SAM','增速'],     agents: ['market','swot_bp'] },
  { words: ['竞品','竞争','对手','差异化'],               agents: ['competitor_barrier','swot_bp'] },
  { words: ['AI','模型','算法','技术','架构'],            agents: ['n34','tech'] },
  { words: ['产品','功能','需求','PRD','特性'],           agents: ['charter','prd'] },
  { words: ['定位','方向','北极星','战略'],               agents: ['charter','prd','roadmap'] },
  { words: ['商业','盈利','BP','变现','收入'],            agents: ['swot_bp','brd_mrd'] },
  { words: ['合规','法规','安全','隐私'],                 agents: ['compliance','sop_tech'] },
  { words: ['上线','运营','推广','增长'],                 agents: ['launch_ops','aso_retro'] },
];

function suggestAgents(text) {
  const suggested = new Set();
  const t = text.toLowerCase();
  for (const { words, agents } of KEYWORD_MAP) {
    if (words.some(w => t.includes(w))) {
      agents.forEach(a => suggested.add(a));
    }
  }
  // 级联扩展
  const cascade = new Set(suggested);
  for (const a of suggested) {
    (CASCADE[a] || []).forEach(c => cascade.add(c));
  }
  return cascade;
}

function statusBadge(status) {
  const map = {
    running:    ['badge-running',    '⏳ 运行中'],
    completed:  ['badge-completed',  '✅ 已完成'],
    blocked:    ['badge-blocked',    '🔴 BLOCK'],
    terminated: ['badge-terminated', '🛑 已终止'],
    iterating:  ['badge-iterating',  '🔄 迭代中'],
  };
  const [cls, label] = map[status] || ['badge-running', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

function phasePills(phases_done, active_phases) {
  const all = active_phases?.length ? active_phases : ['p1','p2','p3','p4','p5','p6'];
  return all.map(p => {
    const done = phases_done?.includes(p);
    return `<span class="phase-pill ${done ? 'done' : ''}">${p.toUpperCase()}</span>`;
  }).join('');
}

function renderProjects(projects) {
  const el = document.getElementById('project-list');
  if (!projects.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="big">📭</div>
      <h3>还没有项目记录</h3>
      <p>先去 <a href="index.html" style="color:var(--peach)">需求入口</a> 跑一个标准档项目</p>
    </div>`;
    return;
  }
  el.innerHTML = projects.map((p, idx) => {
    const iters = p.iterations || [];
    const hasIters = iters.length > 0;
    return `
    <div class="project-card" id="pc-${idx}">
      <div class="card-header" onclick="toggleCard(${idx})">
        <div class="card-icon">🏗</div>
        <div class="card-meta">
          <div class="card-title">${escHtml(p.product || '未命名项目')}</div>
          <div class="card-sub">
            ${statusBadge(p.status)}
            <span>🏭 ${escHtml(p.industry || '未知行业')}</span>
            <span>📅 ${p.created_at || ''}</span>
            <span>📄 ${(p.docs||[]).length} 份文档</span>
            ${hasIters ? `<span>🔄 ${iters.length} 次迭代</span>` : ''}
            ${p.ceo_gate_score ? `<span>🎯 Gate: ${p.ceo_gate_score}/500</span>` : ''}
          </div>
          <div class="phase-row">${phasePills(p.phases_done, p.active_phases)}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); openIteratePanel(${idx})">🔄 迭代更新</button>
          <span style="color:var(--muted);font-size:18px;" id="toggle-${idx}">▸</span>
        </div>
      </div>
      <div class="card-body" id="cb-${idx}">
        <!-- 文档列表 -->
        ${(p.docs||[]).length > 0 ? `
        <div class="docs-section">
          <h4>生成文档（${(p.docs||[]).length} 份）</h4>
          <div class="docs-grid">
            ${(p.docs||[]).map(d => `
              <div class="doc-item" onclick="viewDoc('${escHtml(p.project_dir)}/${escHtml(d.filename)}', '${escHtml(d.name)}')">
                <div class="doc-name">📄 ${escHtml(d.name)}</div>
                <div class="doc-meta">${d.size_kb} KB</div>
              </div>
            `).join('')}
          </div>
        </div>` : ''}

        <!-- 迭代历史 -->
        ${hasIters ? `
        <div class="iter-history">
          <h4 style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">迭代历史</h4>
          ${iters.map(it => `
            <div class="iter-item">
              <div class="iter-item-title">v${it.iteration_num} · ${it.created_at}</div>
              <div class="iter-item-summary">${escHtml(it.change_summary)}</div>
              <div style="margin-top:4px;font-size:11px;color:var(--muted);">重跑：${(it.agent_keys||[]).join(', ')}</div>
            </div>
          `).join('')}
        </div>` : ''}

        <!-- 迭代面板（默认隐藏）-->
        <div class="iterate-panel" id="iter-panel-${idx}" style="display:none;">
          <h3>🔄 发起迭代更新</h3>
          <p>描述本次改动（开会决定了什么），系统自动推荐要更新哪些文档</p>
          <textarea id="iter-summary-${idx}" rows="4"
            placeholder="例：开会决定把目标用户从 B 端中小企业改为个人用户，核心场景聚焦在个人理财规划，不再做企业资金管理..."
            oninput="autoSuggestAgents(${idx})"
            style="margin-bottom:0"></textarea>

          <div class="agent-selector">
            <h4>选择要重跑的文档（系统根据改动内容自动推荐，可自行调整）</h4>
            <div class="agent-grid" id="agent-grid-${idx}">
              ${Object.entries(AGENT_INFO).map(([k,v]) => `
                <label class="agent-chip" id="chip-${idx}-${k}">
                  <input type="checkbox" value="${k}" id="chk-${idx}-${k}"
                    onchange="syncChipStyle(${idx},'${k}')">
                  <span>${v.phase} · ${v.label}</span>
                </label>
              `).join('')}
            </div>
            <div class="cascade-hint" id="cascade-hint-${idx}"></div>
          </div>

          <div class="iterate-submit">
            <button class="btn btn-primary" onclick="submitIterate(${idx}, '${escHtml(p.batch_id)}')">🚀 开始迭代</button>
            <button class="btn btn-ghost" onclick="closeIteratePanel(${idx})">取消</button>
            <div class="iterate-result" id="iter-result-${idx}"></div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 交互函数 ──

function toggleCard(idx) {
  const body = document.getElementById(`cb-${idx}`);
  const arrow = document.getElementById(`toggle-${idx}`);
  const open = body.classList.toggle('open');
  arrow.textContent = open ? '▾' : '▸';
}

function openIteratePanel(idx) {
  const body = document.getElementById(`cb-${idx}`);
  const panel = document.getElementById(`iter-panel-${idx}`);
  body.classList.add('open');
  document.getElementById(`toggle-${idx}`).textContent = '▾';
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function closeIteratePanel(idx) {
  document.getElementById(`iter-panel-${idx}`).style.display = 'none';
}

function syncChipStyle(idx, key) {
  const chk = document.getElementById(`chk-${idx}-${key}`);
  const chip = document.getElementById(`chip-${idx}-${key}`);
  chip.classList.toggle('selected', chk.checked);
}

function autoSuggestAgents(idx) {
  const text = document.getElementById(`iter-summary-${idx}`)?.value || '';
  if (text.length < 5) return;
  const suggested = suggestAgents(text);
  let cascade_list = [];
  for (const [k, v] of Object.entries(AGENT_INFO)) {
    const chip = document.getElementById(`chip-${idx}-${k}`);
    const chk  = document.getElementById(`chk-${idx}-${k}`);
    if (!chip || !chk) continue;
    if (suggested.has(k)) {
      chip.classList.add('suggested');
      if (!chk.checked) { chk.checked = true; chip.classList.add('selected'); }
    }
    if (chk.checked) cascade_list.push(AGENT_INFO[k].label);
  }
  const hint = document.getElementById(`cascade-hint-${idx}`);
  if (hint && cascade_list.length) {
    hint.textContent = `💡 已自动选中：${cascade_list.join(' · ')}（含级联依赖文档）`;
  }
}

async function submitIterate(idx, batchId) {
  const summary = document.getElementById(`iter-summary-${idx}`)?.value?.trim();
  if (!summary) { alert('请先填写改动说明'); return; }

  const agentKeys = [];
  for (const k of Object.keys(AGENT_INFO)) {
    const chk = document.getElementById(`chk-${idx}-${k}`);
    if (chk?.checked) agentKeys.push(k);
  }
  if (!agentKeys.length) { alert('请至少选择一个要重跑的文档'); return; }

  const resultEl = document.getElementById(`iter-result-${idx}`);
  resultEl.style.display = 'block';
  resultEl.className = 'iterate-result';
  resultEl.textContent = '🚀 正在提交迭代任务...';

  try {
    const r = await fetch(BRIDGE + '/api/iterate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ batch_id: batchId, change_summary: summary, agent_keys: agentKeys }),
    });
    const d = await r.json();
    if (d.ok) {
      resultEl.className = 'iterate-result ok';
      resultEl.innerHTML = `✅ 迭代 v${d.iteration_num} 已启动<br>
        首个 Agent：<strong>${d.first_agent}</strong><br>
        排队中：${(d.queued||[]).join(', ') || '无'}<br>
        快照已保存 · <a href="results.html?batch_id=${d.iter_batch_id}" style="color:var(--green)">在结果台查看进度 →</a>`;
    } else {
      resultEl.className = 'iterate-result err';
      resultEl.textContent = '❌ ' + (d.error || '提交失败');
    }
  } catch(e) {
    resultEl.className = 'iterate-result err';
    resultEl.textContent = '❌ 桥未启动或网络错误：' + e.message;
  }
}

async function viewDoc(filePath, name) {
  document.getElementById('docModalTitle').textContent = name;
  document.getElementById('docModalContent').textContent = '加载中...';
  document.getElementById('docModal').classList.add('open');
  try {
    const r = await fetch(BRIDGE + '/api/project-file?path=' + encodeURIComponent(filePath));
    const d = await r.json();
    document.getElementById('docModalContent').textContent = d.content || '（空文件）';
  } catch(e) {
    document.getElementById('docModalContent').textContent = '加载失败：' + e.message;
  }
}

function closeDocModal() {
  document.getElementById('docModal').classList.remove('open');
}

document.getElementById('docModal').addEventListener('click', e => {
  if (e.target === document.getElementById('docModal')) closeDocModal();
});

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 初始加载 ──
(async () => {
  try {
    const r = await fetch(BRIDGE + '/api/projects');
    const projects = await r.json();
    renderProjects(projects);
  } catch(e) {
    document.getElementById('project-list').innerHTML = `
      <div class="empty-state">
        <div class="big">🔌</div>
        <h3>桥未启动</h3>
        <p>请先启动桃子公司 · 然后刷新此页面</p>
      </div>`;
  }
})();
</script>
