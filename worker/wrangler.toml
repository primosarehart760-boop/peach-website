name = "peach-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

# ── R2 存储（spell/模板/知识库/产出文档）──
[[r2_buckets]]
binding = "R2"
bucket_name = "peach-assets"

# ── KV 命名空间（任务状态）──
[[kv_namespaces]]
binding = "KV"
id = "placeholder"          # wrangler kv namespace create PEACH_STATE 后替换

# ── 环境变量（非敏感）──
[vars]
DEEPSEEK_MODEL = "deepseek-chat"
MAX_TOKENS = "8192"

# ── 本地开发 ──
[dev]
port = 8787
